# 聚合窗口默认 15 秒。
default_window = "15s"
action = ""
delete_rules_point = false

# 示例 1：对 OTEL JVM 指标做最大值聚合。
[[aggregate_rules]]
name = "otel-jvm-memory"
group_by = ["service_name", "id"]

[aggregate_rules.select]
category = "metric"
measurements = ["otel_service"]
metric_name = ["jvm.buffer.memory.used"]
condition = ""

[aggregate_rules.algorithms."jvm.buffer.memory.used.max"]
method = "max"
source_field = "jvm.buffer.memory.used"

[aggregate_rules.algorithms."jvm.buffer.memory.used.max".add_tags]
method = "max"

# 示例 2：在 tracing 数据中统计 root span 数量。
# 这里通过 parent_id == "0" 近似识别 root span，
# 再对 span_id 做 COUNT，得到 root span 总数。
[[aggregate_rules]]
name = "trace_root_span_count"
group_by = ["service", "resource"]

[aggregate_rules.select]
category = "tracing"
measurements = ["opentelemetry"]
metric_name = ["span_id"]
condition = '{ parent_id = "0" }'

[aggregate_rules.algorithms."root_span.count"]
method = "count"
source_field = "span_id"

[aggregate_rules.algorithms."root_span.count".add_tags]
metric = "root_span_count"

# 示例 3：对 OTEL 日志做计数聚合。
# 这里按 service 和 status 聚合 message 条数。
[[aggregate_rules]]
name = "otel_logging_count"
group_by = ["service", "status"]

[aggregate_rules.select]
category = "logging"
measurements = ["tmall"]
metric_name = ["message"]
condition = ""

[aggregate_rules.algorithms."message_count"]
method = "count"
source_field = "message"

[aggregate_rules.algorithms."message_count".add_tags]
metric = "logging_count"

# 示例 4：按 service_name 汇总 JVM 当前已加载类数量。
[[aggregate_rules]]
name = "otel_jvm_class_loaded_sum"
group_by = ["service_name"]

[aggregate_rules.select]
category = "metric"
measurements = ["otel_service"]
metric_name = ["jvm.classes.loaded"]
condition = ""

[aggregate_rules.algorithms."jvm_class_loaded_sum"]
method = "sum"
source_field = "jvm.classes.loaded"

[aggregate_rules.algorithms."jvm_class_loaded_sum".add_tags]
metric = "jvm_class_loaded_sum"

# 示例 5：按 service_name 汇总 JVM 累计卸载类数量。
[[aggregate_rules]]
name = "otel_jvm_class_unloaded_sum"
group_by = ["service_name"]

[aggregate_rules.select]
category = "metric"
measurements = ["otel_service"]
metric_name = ["jvm.classes.unloaded"]
condition = ""

[aggregate_rules.algorithms."jvm_class_unloaded_sum"]
method = "sum"
source_field = "jvm.class.unloaded"

[aggregate_rules.algorithms."jvm_class_unloaded_sum".add_tags]
metric = "jvm_class_unloaded_sum"

# 示例 6：按 service_name 汇总 JVM 活跃线程数。
[[aggregate_rules]]
name = "otel_jvm_threads_live_sum"
group_by = ["service_name"]

[aggregate_rules.select]
category = "metric"
measurements = ["otel_service"]
metric_name = ["jvm.threads.live"]
condition = ""

[aggregate_rules.algorithms."jvm_threads_live_sum"]
method = "sum"
source_field = "jvm.threads.live"

[aggregate_rules.algorithms."jvm_threads_live_sum".add_tags]
metric = "jvm_threads_live_sum"
