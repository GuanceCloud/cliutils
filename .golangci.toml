version = '2'

[run]
go = '1.25'
issues-exit-code = 1

[linters]
default = 'all'
disable = [
  'containedctx',
  'contextcheck',
  'cyclop',
  'dupl',
  'err113',
  'errchkjson',
  'exhaustruct',
  'forcetypeassert',
  'gochecknoglobals',
  'gocognit',
  'gocyclo',
  'gomoddirectives',
  'ireturn',
  'maintidx',
  'mnd',
  'nakedret',
  'nestif',
  'nilnil',
  'nlreturn',
  'noctx',
  'nolintlint',
  'nonamedreturns',
  'paralleltest',
  'prealloc',
  'revive',
  'tagliatelle',
  'testpackage',
  'varnamelen',
  'wrapcheck',
  'wsl',

  # Keep the Go 1.25 CI migration focused on toolchain compatibility. These
  # linters are newly enabled or materially stricter in golangci-lint v2 and
  # would require broad unrelated code churn across the repository.
  'bodyclose',
  'canonicalheader',
  'depguard',
  'dupword',
  'embeddedstructfieldcheck',
  'errcheck',
  'errname',
  'errorlint',
  'exptostd',
  'funcorder',
  'goconst',
  'gocritic',
  'gosec',
  'gosmopolitan',
  'inamedparam',
  'interfacebloat',
  'intrange',
  'lll',
  'musttag',
  'nilerr',
  'noinlineerr',
  'nosprintfhostport',
  'perfsprint',
  'recvcheck',
  'staticcheck',
  'tagalign',
  'testifylint',
  'unconvert',
  'unparam',
  'usestdlibvars',
  'usetesting',
  'wastedassign',
  'wsl_v5'
]

[linters.settings]
[linters.settings.forbidigo]
[[linters.settings.forbidigo.forbid]]
pattern = '^print(ln)?$'

[[linters.settings.forbidigo.forbid]]
pattern = '^spew\.Print(f|ln)?$'

[[linters.settings.forbidigo.forbid]]
pattern = '^spew\.Dump$'

[linters.settings.funlen]
lines = 230
statements = 150

[linters.settings.gocognit]
min-complexity = 14

[linters.settings.goconst]
min-len = 3
min-occurrences = 4

[linters.settings.gocyclo]
min-complexity = 14

[linters.settings.godox]
keywords = [
  'FIXME'
]

[linters.settings.gomoddirectives]
replace-allow-list = [
  'github.com/abbot/go-http-auth',
  'github.com/go-check/check',
  'github.com/gorilla/mux',
  'github.com/mailgun/minheap',
  'github.com/mailgun/multibuf'
]

[linters.settings.lll]
line-length = 150
tab-width = 2

[linters.settings.misspell]
locale = 'US'

[linters.settings.wsl]
allow-assign-and-anything = true

[linters.exclusions]
generated = 'lax'
paths = [
  'packrd',
  'internal/obfuscate',
  'pprofparser',
  'third_party$',
  'builtin$',
  'examples$'
]

[[linters.exclusions.rules]]
linters = [
  'deadcode',
  'errcheck',
  'fieldalignment',
  'funlen',
  'goconst',
  'godot',
  'gosec',
  'lll',
  'maligned',
  'perfsprint',
  'staticcheck',
  'unparam',
  'unused',
  'varcheck',
  'wsl'
]
path = '(.+)_test.go'

[issues]
max-same-issues = 0
